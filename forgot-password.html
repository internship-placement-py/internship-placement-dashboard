<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://d3js.org https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' https: data:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; frame-ancestors 'none';">
    <title>Reset Password — Placement Monitor Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            height: 100vh;
            background: #162337;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MAIN CONTAINER */

        .container {
            display: flex;
            width: 900px;
            height: 500px;
            background: #111f33;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        /* LEFT SIDE */

        .left {
            flex: 1;
            background: linear-gradient(160deg, #0b1a2a, #07121e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .logo {
            width: 140px;
            margin-bottom: 8px;
        }

        .left h1 {
            font-size: 28px;
            color: #ffffff;
            margin: 0;
            white-space: nowrap;
        }

        .left p {
            font-size: 14px;
            margin-top: 5px;
            opacity: 1;
        }

        /* RIGHT SIDE */

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            background: #0f2236;
        }

        .right h2 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        /* INPUT BOX */

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #1b344d;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        /* INPUT HOVER EFFECT */

        .input-box input:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .input-box input:focus {
            transform: translateY(-4px);
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.6);
        }

        /* LOGIN BUTTON */

        button {
            width: 100%;
            padding: 12px;
            background: #ff8c00;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 12px rgba(255, 140, 0, 0.7);
            background: #ffa733;
        }

        button:active {
            transform: translateY(1px);
        }

        /* EXTRA LINKS */

        .extra {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .extra a {
            color: #ffffff;
            text-decoration: none;
        }

        /* ERROR / STATUS */
        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.5);
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

    <div class="container">

        <div class="left">

            <a href="https://rru.ac.in/" target="_blank">
                <img src="https://rise.rru.ac.in/img/home-9/hero/RRU-Logo.png" class="logo">
            </a>

            <h1>Placement Monitor Dashboard</h1>

            <p>Future Leaders and Security Intelligence</p>

        </div>


        <div class="right">

            <h2>Reset Password</h2>

            
            <form id="fpForm">
                <div id="errorMsg" class="error-msg"></div>
                <div id="successMsg" style="color: #22c55e; margin-bottom: 15px; font-size: 13px; display: none;"></div>
                
                <!-- Step 1: Request OTP -->
                <div id="step1">
                    <p style="color:#ffffff; font-size:13px; text-align:center; margin-bottom:20px;">Enter your registered email address.</p>
                    <div class="input-box">
                        <input type="email" id="resetEmail" placeholder="Email Address" required>
                    </div>
                    <button type="button" id="sendOtpBtn">Send OTP</button>
                </div>

                <!-- Step 2: Verify and Reset -->
                <div id="step2" style="display: none;">
                    <p style="color:#ffffff; font-size:13px; text-align:center; margin-bottom:20px;">Enter the OTP sent to your email.</p>
                    <div class="input-box">
                        <input type="text" id="resetOtp" placeholder="6-digit OTP">
                    </div>
                    <div class="input-box">
                        <input type="password" id="newPassword" placeholder="New Password">
                    </div>
                    <button type="button" id="resetPasswordBtn">Reset Password</button>
                </div>

                <div class="extra" style="justify-content: center;">
                    <a href="index.html">Back to Login</a>
                </div>
            </form>


        </div>

    </div>


    
    <script src="security.js"></script>
        <!-- CDN: Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- CDN: SheetJS for Excel import/export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Supabase config (change only this file when moving to a new host) -->
    <script src="config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="api.js?v=400"></script>
    <script>
        document.getElementById('sendOtpBtn').addEventListener('click', async function() {
            const email = document.getElementById('resetEmail').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('sendOtpBtn');

            errorMsg.classList.remove('show');
            successMsg.style.display = 'none';

            if (!email) {
                errorMsg.textContent = 'Please enter your email.';
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to send OTP');
                
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                successMsg.textContent = 'OTP sent to your email.';
                successMsg.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Send OTP';
            }
        });

        document.getElementById('resetPasswordBtn').addEventListener('click', async function() {
            const email = document.getElementById('resetEmail').value.trim();
            const otp = document.getElementById('resetOtp').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('resetPasswordBtn');

            errorMsg.classList.remove('show');
            successMsg.style.display = 'none';

            if (!otp || !newPassword) {
                errorMsg.textContent = 'Please enter OTP and New Password.';
                errorMsg.classList.add('show');
                return;
            }

            const strength = validatePasswordStrength(newPassword);
            if (!strength.valid) {
                errorMsg.textContent = strength.message;
                errorMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, otp: otp, new_password: newPassword })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Reset failed');
                
                document.getElementById('step2').style.display = 'none';
                successMsg.textContent = 'Password reset successfully! Redirecting to login...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>


</body>

</html>
